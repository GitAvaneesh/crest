<!-- components/navbar.html -->
<!-- Include this in any page using: fetch('/components/navbar.html') or copy paste -->

<style>
  .crest-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    width: 100%;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }

  .crest-nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Logo */
  .crest-nav-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .crest-nav-logo img {
    height: 32px;
    width: auto;
    object-fit: contain;
  }

  /* Nav links */
  .crest-nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .crest-nav-links a {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #555;
    text-decoration: none;
    letter-spacing: -0.1px;
    transition: color 0.15s;
  }

  .crest-nav-links a:hover {
    color: #111;
  }

  .crest-nav-links a.active {
    color: #111;
    font-weight: 500;
  }

  /* Auth buttons */
  .crest-nav-auth {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .crest-btn-login {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #111;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .crest-btn-login:hover {
    background: rgba(0, 0, 0, 0.04);
  }

  .crest-btn-signup {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: #111;
    text-decoration: none;
    padding: 0.5rem 1.25rem;
    border-radius: 6px;
    transition: background 0.15s, transform 0.15s;
  }

  .crest-btn-signup:hover {
    background: #333;
    transform: translateY(-1px);
  }

  /* Mobile hamburger */
  .crest-nav-hamburger {
    display: none;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .crest-nav-hamburger span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: #111;
    border-radius: 2px;
    transition: all 0.2s;
  }

  /* Mobile menu */
  .crest-nav-mobile {
    display: none;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    background: #fff;
    padding: 1rem 2rem 1.5rem;
  }

  .crest-nav-mobile.open {
    display: flex;
  }

  .crest-nav-mobile a {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    color: #444;
    text-decoration: none;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.04);
  }

  .crest-nav-mobile a:last-child {
    border-bottom: none;
  }

  .crest-nav-mobile .mobile-signup {
    margin-top: 0.75rem;
    text-align: center;
    background: #111;
    color: #fff;
    padding: 0.75rem;
    border-radius: 6px;
    font-weight: 500;
  }

  @media (max-width: 768px) {
    .crest-nav-links,
    .crest-nav-auth {
      display: none;
    }

    .crest-nav-hamburger {
      display: flex;
    }
  }
</style>

<nav class="crest-nav">
  <div class="crest-nav-inner">

    <!-- Logo -->
    <a href="/index.html" class="crest-nav-logo">
      <img src="/assets/images/crest-ai.png" alt="Crest AI" onerror="this.style.display='none'">
    </a>

    <!-- Nav Links -->
    <ul class="crest-nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/index.html#features">Features</a></li>
      <li><a href="/index.html#pricing">Pricing</a></li>
      <li><a href="/index.html#about">About</a></li>
    </ul>

    <!-- Auth Buttons -->
    <div class="crest-nav-auth">
      <a href="/pages/auth/login.html" class="crest-btn-login">Log in</a>
      <a href="/pages/auth/login.html?mode=signup" class="crest-btn-signup">Get started</a>
    </div>

    <!-- Hamburger for mobile -->
    <button class="crest-nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="crest-nav-mobile" id="crestMobileMenu">
    <a href="/index.html">Home</a>
    <a href="/index.html#features">Features</a>
    <a href="/index.html#pricing">Pricing</a>
    <a href="/index.html#about">About</a>
    <a href="/pages/auth/login.html" style="color:#111;">Log in</a>
    <a href="/pages/auth/login.html?mode=signup" class="mobile-signup">Get started</a>
  </div>
</nav>

<script>
  function toggleMobileMenu() {
    const menu = document.getElementById('crestMobileMenu')
    menu.classList.toggle('open')
  }

  // Auto highlight active link
  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('.crest-nav-links a')
    links.forEach(link => {
      if (link.href === window.location.href) {
        link.classList.add('active')
      }
    })
  })
</script>
