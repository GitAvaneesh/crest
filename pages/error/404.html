<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Route Unresolved</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* -------------------------------------------------------------------------
       1. MINIMALIST EXPANSIVE LIGHT DESIGN SYSTEM
       ------------------------------------------------------------------------- */
    :root {
      --bg-pure: #ffffff;
      --line-subtle: rgba(0, 0, 0, 0.03);
      --line-active: rgba(0, 0, 0, 0.08);
      
      --text-primary: #000000;
      --text-secondary: rgba(0, 0, 0, 0.45);
      --text-muted: rgba(0, 0, 0, 0.25);
      
      --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-pure);
      color: var(--text-primary);
      font-family: var(--font-display);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      padding: 2rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      body {
        padding: 2rem;
      }
    }

    /* -------------------------------------------------------------------------
       2. HIGH-END ARCHITECTURAL GRID FRAME LAYOUT
       ------------------------------------------------------------------------- */
    .structural-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Clean background alignment borders mimicking top SaaS tools */
    .line-v {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--line-subtle), transparent);
    }
    .line-v-1 { left: 15%; }
    .line-v-2 { left: 50%; }
    .line-v-3 { right: 15%; }

    /* Ultra-subtle light vignette drop for spatial balance */
    .ambient-glow {
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0, 0, 0, 0.012) 0%, rgba(0, 0, 0, 0) 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
    }

    /* -------------------------------------------------------------------------
       3. SYSTEM NAVIGATION BRANDING HEADER
       ------------------------------------------------------------------------- */
    .page-header {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 3rem;
    }

    /* Linked directly to your local assets folder */
    .brand-logo {
      width: 280px;
      height: 120px;
      object-fit: contain;
      display: block;
    }

    /* -------------------------------------------------------------------------
       4. HERO TYPOGRAPHIC CORE SEGMENT
       ------------------------------------------------------------------------- */
    .main-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
      width: 100%;
    }

    /* Massive clean numerical callout block */
    .giant-index {
      font-size: 11rem;
      font-weight: 300;
      line-height: 0.85;
      letter-spacing: -0.05em;
      color: var(--text-primary);
      margin-bottom: 2.5rem;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 768px) {
      .giant-index {
        font-size: 6.5rem;
        margin-bottom: 1.5rem;
      }
    }

    .error-title-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      margin-bottom: 1rem;
    }

    /* Crisp accent separator */
    .status-dot {
      width: 5px;
      height: 5px;
      background-color: var(--text-primary);
      border-radius: 50%;
    }

    .error-headline {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .error-narrative {
      font-size: 0.98rem;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 3.5rem;
    }

    /* -------------------------------------------------------------------------
       5. BUTTON EXECUTION INTERFACES
       ------------------------------------------------------------------------- */
    .action-container {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    @media (max-width: 480px) {
      .action-container {
        flex-direction: column;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 2.25rem;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .btn-primary {
      background-color: var(--text-primary);
      color: var(--bg-pure);
      border: 1px solid var(--text-primary);
    }

    .btn-primary:hover {
      background-color: #1a1a1a;
      border-color: #1a1a1a;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-primary);
      border: 1px solid var(--line-active);
    }

    .btn-secondary:hover {
      background-color: rgba(0, 0, 0, 0.02);
      border-color: rgba(0, 0, 0, 0.18);
      transform: translateY(-1px);
    }

    /* -------------------------------------------------------------------------
       6. SYSTEM METADATA DATA BASE ROW
       ------------------------------------------------------------------------- */
    .page-footer {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--line-subtle);
      padding-top: 1.5rem;
      margin-top: 3rem;
      width: 100%;
    }

    @media (max-width: 540px) {
      .page-footer {
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="structural-lines">
    <div class="line-v line-v-1"></div>
    <div class="line-v line-v-2"></div>
    <div class="line-v line-v-3"></div>
  </div>
  <div class="ambient-glow"></div>

  <header class="page-header">
    <img src="/assets/images/crest-ai.png" alt="Crest AI Logo" class="brand-logo" onerror="this.style.display='none'">
  </header>

  <main class="main-content">
    <div class="giant-index">404</div>
    
    <div class="error-title-wrapper">
      <div class="status-dot"></div>
      <h1 class="error-headline">Route Unresolved</h1>
    </div>
    
    <p class="error-narrative">
      The destination path you pinpointed cannot be matched inside our network infrastructure routing layout. The system index resource might be detached or updated.
    </p>

    <div class="action-container">
      <a href="" class="btn btn-primary">Return to App</a>
      <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
    </div>
  </main>

  <footer class="page-footer">
    <span>System Code: 404 // URL_NOT_FOUND</span>
    <span>&copy; 2026 Crest AI. Infrastructure active.</span>
  </footer>

</body>
</html>
